name: "CodeQL"

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 0 * * 1'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, java-kotlin]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
        if: matrix.language == 'java-kotlin'

      - name: Create local.properties
        run: |
          echo "PLACES_API_KEY=test" > local.properties
          echo "ADMOB_APP_ID=test" >> local.properties
          echo "ADMOB_PROD_REWARDED_ID=test" >> local.properties
        if: matrix.language == 'java-kotlin'

      - name: Build Kotlin
        run: ./gradlew assembleDevDebug --build-cache
        if: matrix.language == 'java-kotlin'

      - name: Build JavaScript
        run: |
          npm ci
          npm run build
        working-directory: functions
        if: matrix.language == 'javascript-typescript'

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
