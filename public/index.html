<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banana App - Eventos sociales cerca de ti</title>
    <meta name="description" content="Descubre y crea eventos sociales cerca de ti. Descarga Banana App gratis.">
    
    <!-- Open Graph (para WhatsApp, Instagram, etc.) -->
    <meta property="og:title" content="Banana App 🍌">
    <meta property="og:description" content="Descubre y crea eventos sociales cerca de ti">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://bananaapp-aa46e.web.app">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Banana App 🍌">
    <meta name="twitter:description" content="Descubre y crea eventos sociales cerca de ti">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 32px;
            max-width: 420px;
        }
        .logo { font-size: 80px; margin-bottom: 16px; }
        h1 { font-size: 32px; margin-bottom: 8px; }
        .subtitle { color: #adb5bd; font-size: 16px; margin-bottom: 32px; }
        .btn {
            display: inline-block;
            background: #FFD700;
            color: #1a1a2e;
            padding: 16px 32px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); }
        .social { margin-top: 24px; color: #adb5bd; font-size: 14px; }
    </style>

    <script>
        // Deep link redirect: si abren /event/xxx, intentar abrir la app
        (function() {
            var path = window.location.pathname;
            if (path.startsWith('/event/')) {
                var eventId = path.replace('/event/', '');
                // Intent URI para abrir la app directamente
                var intentUri = 'intent://banana.app/event/' + eventId + 
                    '#Intent;scheme=https;package=com.eventos.banana;end';
                window.location.href = intentUri;
                // Fallback: si no se abre en 2s, redirigir a Play Store
                setTimeout(function() {
                    window.location.href = 'https://play.google.com/store/apps/details?id=com.eventos.banana';
                }, 2000);
            }
        })();
    </script>
</head>
<body>
    <div class="container">
        <div class="logo">🍌</div>
        <h1>Banana App</h1>
        <p class="subtitle">Descubre y crea eventos sociales cerca de ti</p>
        <a href="https://play.google.com/store/apps/details?id=com.eventos.banana" class="btn">
            📲 Descargar en Play Store
        </a>
        <p class="social">📸 @getbananaapp</p>
    </div>
</body>
</html>
